<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Фуд-рулетка</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0; padding: 0; background-color: #111;
            font-family: Arial, sans-serif; height: 100vh;
            overflow: hidden; user-select: none; -webkit-user-select: none;
            display: flex; justify-content: center; align-items: center; color: white;
        }
        #roulette-container {
            width: 100%; height: 100%; position: relative; display: none;
        }
        #roulette-image {
            width: 100%; height: 100%; object-fit: contain;
            position: absolute; top: 0; left: 0;
        }
        #loader, #start-screen {
            text-align: center; font-size: 24px; z-index: 10; font-weight: bold;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: absolute; width: 100%; height: 100%; background: #111;
        }
        #start-screen {
            display: none; background: rgba(0,0,0,0.8); cursor: pointer;
        }
        .pulse-text {
            animation: pulse 1s infinite alternate; color: #FFD700;
        }
        @keyframes pulse {
            from { transform: scale(1); opacity: 0.8; }
            to { transform: scale(1.1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="loader">Загружаем сочные кадры...<br><span id="progress">0</span>%</div>

    <div id="start-screen">
        <div class="pulse-text">👉 ЖМИ СЮДА, ЧТОБЫ НАЧАТЬ! 👈</div>
    </div>

    <div id="roulette-container">
        <img id="roulette-image" src="" alt="food">
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Инициализация звуков
        const spinSound = new Audio('spin.mp3');
        const winSound = new Audio('win.mp3');
        spinSound.loop = true;
        spinSound.volume = 0.6;
        winSound.volume = 1.0;

        const urlParams = new URLSearchParams(window.location.search);
        const restId = urlParams.get('rest_id') || '1';

        // Загружаем JSON с меню и настройками
        fetch(`menu_${restId}.json`)
            .then(response => {
                if (!response.ok) throw new Error("Меню не найдено");
                return response.json();
            })
            .then(data => {
                
                // Достаем структуру из JSON
                const myItems = data.menu;
                const schedule = data.schedule;

                const margins = myItems.filter(item => item.type === "margin");
                const bases = myItems.filter(item => item.type === "base");
                const funs = myItems.filter(item => item.type === "fun");
                const jokers = myItems.filter(item => item.type === "joker");

                const getNext = (arr, counter) => {
                    if (arr.length === 0) return myItems[0];
                    const item = arr[counter.val % arr.length];
                    counter.val++;
                    return item;
                };

                let mCount = { val: 0 };
                let bCount = { val: 0 };
                let fCount = { val: 0 };

                let frames = [];

                // Жесткая сборка 200 кадров (Зебра)
                for (let i = 0; i < 200; i++) {
                    if (i === 125 && jokers.length > 0) {
                        frames.push(jokers[0]);
                        continue;
                    }
                    if (i % 2 === 0) {
                        frames.push(getNext(margins, mCount));
                    } else {
                        if (i % 6 === 3) {
                            frames.push(getNext(funs, fCount));
                        } else {
                            frames.push(getNext(bases, bCount));
                        }
                    }
                }

                let loadedImagesCount = 0;
                const totalImages = myItems.length;

                myItems.forEach((item) => {
                    const img = new Image();
                    img.src = item.src;
                    img.onload = () => {
                        loadedImagesCount++;
                        document.getElementById('progress').innerText = Math.round((loadedImagesCount / totalImages) * 100);
                        if (loadedImagesCount === totalImages) showStartScreen();
                    };
                    img.onerror = () => {
                        loadedImagesCount++;
                        if (loadedImagesCount === totalImages) showStartScreen();
                    }
                });

                let currentIndex = 0;
                let isRunning = false;
                let intervalId;

                const loader = document.getElementById('loader');
                const startScreen = document.getElementById('start-screen');
                const container = document.getElementById('roulette-container');
                const imageElement = document.getElementById('roulette-image');

                function showStartScreen() {
                    loader.style.display = 'none';
                    startScreen.style.display = 'flex';
                }

                startScreen.addEventListener('click', function() {
                    startScreen.style.display = 'none';
                    container.style.display = 'block';
                    
                    spinSound.play().catch(()=>{}); spinSound.pause(); spinSound.currentTime = 0;
                    winSound.play().catch(()=>{}); winSound.pause(); winSound.currentTime = 0;

                    spinSound.play().catch(()=>{});
                    isRunning = true;
                    intervalId = setInterval(changeFrame, 150);
                });

                function changeFrame() {
                    if (!isRunning) return;
                    imageElement.src = frames[currentIndex].src;
                    currentIndex++;
                    if (currentIndex >= frames.length) currentIndex = 0;
                }

                container.addEventListener('click', function() {
                    if (!isRunning) return;
                    
                    isRunning = false;
                    clearInterval(intervalId);
                    
                    spinSound.pause();
                    winSound.play().catch(()=>{});
                    
                    const winner = frames[currentIndex === 0 ? frames.length - 1 : currentIndex - 1];
                    tg.HapticFeedback.notificationOccurred('success');

                    // Отправляем блюдо и график работы в Telegram
                    setTimeout(() => {
                        tg.sendData(JSON.stringify({
                            result_name: winner.name,
                            result_type: winner.type,
                            result_src: winner.src,
                            work_start: schedule.start,
                            work_end: schedule.end,
                            tz_offset: schedule.tz_offset
                        }));
                    }, 1200);
                });
            })
            .catch(error => {
                document.getElementById('loader').innerHTML = "Ошибка загрузки меню 😔<br>Проверьте ссылку.";
            });
    </script>
</body>
</html>
